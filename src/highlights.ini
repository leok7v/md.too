# highlights.ini -- language and theme definitions for Highlight.swift
#
# Format: dot-separated keys, one entry per line. Lines starting with # or ;
# are comments. The first '=' splits key from value; the rest of the line is
# the value verbatim (no quoting, no escaping). Trailing whitespace on the
# value is trimmed.
#
# A trailing backslash continues the value onto the next line. Both lines
# are trimmed before concatenation, so leading whitespace on the next line
# is dropped.
#
# Per-language pattern fields (any may be set on a family or overridden by a
# language; all are optional):
#   lineComment, blockComment, string, number   -> classic structural patterns
#   tag                                         -> colored as "variable"
#   attr                                        -> colored as "attr"
#   meta                                        -> colored as "builtin"
#   type                                        -> colored as "type"
#   builtin                                     -> colored as "builtin"
#   keywords                                    -> comma-separated, "keyword"
#
# Apply order: blockComment, lineComment, string, meta, tag, attr, type,
# builtin, number, keywords. Earlier matches mask later ones.

# --- Families ---------------------------------------------------------------

family.c-like.lineComment = //[^\n]*
family.c-like.blockComment = /\*.*?\*/
family.c-like.string = "(?:\\.|[^"\\\n])*"|'(?:\\.|[^'\\\n])*'
family.c-like.number = \b(?:0[xX][0-9a-fA-F_]+|\
    [0-9][0-9_]*\.?[0-9_]*(?:[eE][+-]?[0-9_]+)?)[fFlLuU]*\b

family.hash-line.lineComment = #[^\n]*
family.hash-line.string = "(?:\\.|[^"\\\n])*"|'(?:\\.|[^'\\\n])*'
family.hash-line.number = -?\b\d+(?:\.\d+)?(?:[eE][+-]?\d+)?\b

family.markup.blockComment = <!--[\s\S]*?-->
family.markup.string = "[^"\n]*"|'[^'\n]*'
family.markup.tag = </?[a-zA-Z][a-zA-Z0-9:-]*
family.markup.attr = (?<=\s)[a-zA-Z_:][a-zA-Z0-9_.:-]*(?=\s*=)

family.stylesheet.blockComment = /\*[\s\S]*?\*/
family.stylesheet.string = "[^"\n]*"|'[^'\n]*'
family.stylesheet.number = -?\b\d+(?:\.\d+)?\
    (?:px|em|rem|%|vh|vw|pt|deg|s|ms)?\b

family.lisp-like.lineComment = ;[^\n]*
family.lisp-like.string = "(?:\\.|[^"\\\n])*"
family.lisp-like.number = -?\b\d+(?:\.\d+)?\b

family.haskell-like.lineComment = --[^\n]*
family.haskell-like.blockComment = \{-[\s\S]*?-\}
family.haskell-like.string = "(?:\\.|[^"\\\n])*"
family.haskell-like.number = -?\b\d+(?:\.\d+)?\b
family.haskell-like.type = \b[A-Z][a-zA-Z0-9_']*\b

family.ml-like.blockComment = \(\*[\s\S]*?\*\)
family.ml-like.string = "(?:\\.|[^"\\\n])*"
family.ml-like.number = -?\b\d+(?:\.\d+)?\b
family.ml-like.type = \b[A-Z][a-zA-Z0-9_']*\b

